version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mv_jewelers_db
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=db_admin
      - MONGO_INITDB_ROOT_PASSWORD=secure_dev_password_123
      - MONGO_INITDB_DATABASE=mv-jewelers
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - overlay_net

  backend:
    build: ./backend
    container_name: mv_jewelers_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://db_admin:secure_dev_password_123@mongodb:27017/mv-jewelers?authSource=admin
      - JWT_SECRET=super_secret_for_dev_only_change_in_prod
      - ADMIN_USER=admin
      - ADMIN_PASS=password123
      - AWS_ACCESS_KEY_ID=
      - AWS_SECRET_ACCESS_KEY=
      - AWS_REGION=ap-south-1
      - AWS_S3_BUCKET=jewelsmv1
      - RAZORPAY_KEY_ID=rzp_test_YOUR_KEY_HERE
      - RAZORPAY_KEY_SECRET=rzp_test_YOUR_SECRET_HERE
    depends_on:
      - mongodb
    networks:
      - overlay_net

  frontend:
    build: ./frontend
    container_name: mv_jewelers_ui
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - overlay_net

volumes:
  mongo_data:

networks:
  overlay_net:
    driver: bridge
